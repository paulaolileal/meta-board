<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        width: 280px;
        margin: 0;
        padding: 16px;
        color: #1f2937;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      header img {
        width: 28px;
        height: 28px;
      }
      header span {
        font-weight: 700;
        font-size: 15px;
      }
      p.hint {
        font-size: 13px;
        color: #6b7280;
        margin: 0 0 14px;
        line-height: 1.4;
      }
      button {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #4f46e5;
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #status {
        font-size: 12.5px;
        margin-top: 10px;
        text-align: center;
        min-height: 16px;
      }
      #status.success {
        color: #16a34a;
      }
      #status.error {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" alt="MetaBoard" />
      <span>MetaBoard</span>
    </header>
    <p class="hint">
      Abra um post ou reel do Instagram e clique no botão para enviar o conteúdo para o seu board.
    </p>
    <button id="capture">Enviar para o MetaBoard</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
